            #static-loader {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: #0a0a0a;
                transition: opacity 0.5s ease-out;
            }

            .modern-spinner {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: conic-gradient(from 0deg, rgba(45, 112, 145, 0) 0%, rgba(45, 112, 145, 1) 50%, rgba(160, 100, 130, 1) 90%, #ffffff 100%);
                -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 1.5px));
                mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 1.5px));
                animation: spin 1s linear infinite;
            }

            @keyframes spin {
                from {
                    transform: rotate(0deg);
                }

                to {
                    transform: rotate(360deg);
                }
            }
        </style>
        <div id="static-loader">
            <div class="modern-spinner"></div>
        </div>
